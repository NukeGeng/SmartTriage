services:
  postgres:
    image: postgres:16-alpine
    container_name: smarttriage-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: smarttriage
      POSTGRES_PASSWORD: smarttriage
      POSTGRES_DB: smarttriage_db
    ports:
      - "5432:5432"
    volumes:
      - smarttriage_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smarttriage -d smarttriage_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  ai-service:
    build:
      context: ./ai-service
    container_name: smarttriage-ai-service
    restart: unless-stopped
    environment:
      APP_ENV: development
      MODEL_DIR: models
      DATASET_PATH: data/raw/ticket_samples.csv
      DUPLICATE_INDEX_PATH: data/tickets_index/sample_existing_tickets.csv
    ports:
      - "8001:8001"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/api/v1/health', timeout=5)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: ./backend
    container_name: smarttriage-backend
    restart: unless-stopped
    environment:
      APP_ENV: development
      FRONTEND_URL: http://localhost:3000
      DATABASE_URL: postgresql://smarttriage:smarttriage@postgres:5432/smarttriage_db
      JWT_SECRET_KEY: change-me-in-production
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      AI_SERVICE_URL: http://ai-service:8001
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=5)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_BACKEND_URL: http://localhost:8000
    container_name: smarttriage-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_BACKEND_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/login >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  smarttriage_pgdata:
